<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sección 3A · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #080810;
    --cyan: #00c2ff;
    --magenta: #d400ff;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --section-gap: clamp(4rem, 8vw, 7rem);
    --container-width: 1200px;
  }

  body {
    background: var(--bg-base);
    font-family: var(--font-body);
    color: white;
  }

  .container {
    width: 100%;
    max-width: var(--container-width);
    margin-inline: auto;
    padding-inline: clamp(1.25rem, 5vw, 3rem);
  }

  /* gradient text */
  .gradient-text {
    background-image: linear-gradient(90deg, var(--cyan), var(--magenta));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  /* divider bar */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    margin-bottom: 1.5rem;
  }

  /* ── SECCIÓN 3A ── */
  .problema-3a {
    padding-block: var(--section-gap);
    background: var(--bg-base);
  }

  .problema-3a__grid {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 0 clamp(2.5rem, 5vw, 5rem);
    align-items: center;
  }

  /* Línea vertical — mismo lenguaje que section-line pero en vertical */
  .problema-3a__sep {
    width: 1px;
    align-self: stretch;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(0, 194, 255, 0.35) 20%,
      rgba(0, 194, 255, 0.35) 80%,
      transparent
    );
  }

  /* Columna izquierda */
  .problema-3a__titulo {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 4.5vw, 4.2rem);
    line-height: 1.0;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  /* Columna derecha — lista */
  .problema-3a__lista {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .problema-3a__lista li {
    display: grid;
    grid-template-columns: 1.5rem 1fr;
    column-gap: 0.75rem;
    align-items: baseline;
    padding-block: 1.1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    font-size: clamp(0.95rem, 1.4vw, 1.05rem);
    color: rgba(255, 255, 255, 0.82);
    font-weight: 400;
    line-height: 1.5;
  }

  .problema-3a__lista li:first-child {
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }

  .problema-3a__lista li::before {
    content: '—';
    color: var(--cyan);
    font-size: 0.9em;
    line-height: 1.6;
  }
</style>
</head>
<body>
<section class="problema-3a">
  <div class="container">
    <div class="problema-3a__grid">

      <!-- Columna izquierda: título -->
      <div>
        <div class="divider"></div>
        <h2 class="problema-3a__titulo">
          LO QUE ESTÁ<br>
          FRENANDO<br>
          EL CRECIMIENTO<br>
          DE TU <span class="gradient-text">MARCA</span>
        </h2>
      </div>

      <!-- Separador vertical -->
      <div class="problema-3a__sep" aria-hidden="true"></div>

      <!-- Columna derecha: lista -->
      <ul class="problema-3a__lista">
        <li>Presencia digital débil o desordenada</li>
        <li>Redes sociales sin dirección estratégica</li>
        <li>Contenido visual poco profesional</li>
        <li>Baja conexión con la audiencia</li>
        <li>Dificultad para convertir visibilidad en ventas</li>
      </ul>

    </div>
  </div>
</section>
</body>
</html>
